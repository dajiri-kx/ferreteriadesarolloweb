<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"></head>
    <body>
        <header th:replace="~{general/fragmentos :: header}"></header>
        <section th:replace="~{general/fragmentos :: mostrarToast}"></section>

        <main class="container mt-4">
            <!-- Barra superior -->
            <div class="row py-3 mb-3 bg-light rounded align-items-center">
                <div class="col-md-8">
                    <h3 class="mb-0">
                        <i class="fa-solid fa-location-dot" style="color: #E8641A;"></i>
                        [[#{direccion.titulo}]]
                    </h3>
                </div>
                <div class="col-md-4 text-end">
                    <button type="button" class="btn btn-primary"
                            data-bs-toggle="modal" data-bs-target="#modalDireccion"
                            onclick="limpiarFormDireccion()">
                        <i class="fa-solid fa-plus"></i> [[#{direccion.nueva}]]
                    </button>
                </div>
            </div>

            <!-- Sin direcciones -->
            <div th:if="${#lists.isEmpty(direcciones)}" class="alert alert-info">
                <i class="fa-solid fa-circle-info"></i>
                No tienes direcciones de envío guardadas. ¡Agrega una!
            </div>

            <!-- Grid de tarjetas -->
            <div class="row" th:unless="${#lists.isEmpty(direcciones)}">
                <div class="col-md-6 mb-3" th:each="dir : ${direcciones}">
                    <div class="card h-100"
                         th:classappend="${dir.esPredeterminada} ? 'border-warning border-2' : ''">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <h5 class="card-title mb-1">
                                    <i class="fa-solid fa-house"></i>
                                    <span th:text="${!#strings.isEmpty(dir.alias) ? dir.alias : 'Sin alias'}"></span>
                                </h5>
                                <span th:if="${dir.esPredeterminada}"
                                      class="badge badge-predeterminada">
                                    <i class="fa-solid fa-star"></i> [[#{direccion.predeterminada}]]
                                </span>
                            </div>
                            <p class="card-text text-muted mt-2 mb-1">
                                <i class="fa-solid fa-map-pin"></i>
                                <span th:text="${dir.direccion}"></span>
                            </p>
                            <p class="card-text text-muted mb-0">
                                <i class="fa-solid fa-envelope"></i>
                                CP: <span th:text="${dir.codigoPostal}"></span>
                            </p>
                        </div>
                        <div class="card-footer d-flex gap-2 flex-wrap">
                            <!-- Editar -->
                            <button type="button" class="btn btn-sm btn-outline-primary"
                                    data-bs-toggle="modal" data-bs-target="#modalDireccion"
                                    th:data-id="${dir.id}"
                                    th:data-alias="${dir.alias}"
                                    th:data-direccion="${dir.direccion}"
                                    th:data-cp="${dir.codigoPostal}"
                                    th:data-predeterminada="${dir.esPredeterminada}"
                                    onclick="cargarDireccionDesdeData(this)">
                                <i class="fa-solid fa-pen"></i> [[#{accion.editar}]]
                            </button>
                            <!-- Predeterminar -->
                            <form th:unless="${dir.esPredeterminada}"
                                  th:action="@{/perfil/direcciones/predeterminada}"
                                  method="post" class="d-inline">
                                <input type="hidden" name="id" th:value="${dir.id}"/>
                                <button type="submit" class="btn btn-sm btn-outline-warning">
                                    <i class="fa-solid fa-star"></i> Predeterminar
                                </button>
                            </form>
                            <!-- Eliminar -->
                            <form th:action="@{/perfil/direcciones/eliminar}"
                                  method="post" class="d-inline"
                                  onsubmit="return confirm('¿Eliminar esta dirección?')">
                                <input type="hidden" name="id" th:value="${dir.id}"/>
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="fa-solid fa-trash"></i> [[#{accion.eliminar}]]
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Modal agregar/editar -->
        <section th:replace="~{direcciones/fragmentos :: modalDireccion}"></section>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>
    </body>
</html>
