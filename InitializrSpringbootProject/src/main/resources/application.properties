spring.application.name=toolboxcr
#
spring.main.banner-mode=off
#
logging.pattern.dateformat=hh:mm
#Puerto Escogido
server.port=9202
#
#Se evita el uso de caché en desarrollo; en producción debe habilitarse.
spring.thymeleaf.cache=false
#
#Conexión a la BD en la nube ferreteria_web en Aiven MySQL
spring.datasource.url=jdbc:mysql://mysql-1279609f-proyectofinaldesarolloweb-05ae.f.aivencloud.com:20367/ferreteria_web
#
#Usuario y clave de
spring.datasource.username=ferreteria_app
spring.datasource.password=PonAquiTuNuevaClaveSegura2026!
#
#Driver y plataforma de comunicación
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
#
#El esquema ya está corrido en Aiven — Hibernate no modifica la BD
spring.jpa.hibernate.ddl-auto=none
#
#Usar nombres exactos — respeta UPPERCASE en tablas y @Column explícitos
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
#
#Mostrar información en el log
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
#
#Firebase — se inyecta mediante variable de entorno en Render
firebase.bucket.name=${FIREBASE_BUCKET_NAME:sin-configurar}
firebase.storage.path=${FIREBASE_STORAGE_PATH:toolboxcr}
firebase.json.content=${FIREBASE_JSON_CONTENT:}